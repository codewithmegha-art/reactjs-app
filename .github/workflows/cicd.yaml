name: React CI/CD Pipeline

on: 
  push:
    branches: [ 'main']


env:
  IMAGE_NAME: react-app

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:

      # Get your code
      - name: Checkout Source
        uses: actions/checkout@v4

      # Set up the node js 
      - name: Setup node js
        uses: actions/setup-node@v4

      # Install Dependancies
      - name: Install Dependanices
        run: npm ci 

      # Install Gitlekas
      - name: Install Gitleaks
        run: |
         wget https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_$(uname -s)_x64.tar.gz
         tar -xvzf gitleaks_$(uname -s)_x64.tar.gz
         sudo mv gitleaks /usr/local/bin/

      - name: Scan for gitleaks
        run: gitleaks detect --not-git 

            # STEP 4: Install Trivy
      - name: Install Trivy
        run: |
         sudo apt-get update
         sudo apt-get install wget apt-transport-https gnupg -y
         wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
         echo "deb https://aquasecurity.github.io/trivy-repo/deb stable main" | sudo tee /etc/apt/sources.list.d/trivy.list
         sudo apt-get update
         sudo apt-get install trivy -y

      - name: Scan Project
        run: trivy fs . 

      # Docker login 
      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

        # Build the image
      - name: Build the image 
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }} . 

        # Trivy Scan
      - name: Scan Docker Image
        run:  trivy image --scanners vuln ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}

      # Push the image 
      - name: Push Docker Image 
        run: docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}

  deploy:
   needs: build-and-scan
   runs-on: ubuntu-latest

   steps:

     # checkout the code
     - name: Checkout code
       run: actions/checkout@v4

    # Configure AWS
     - name: Configure AWS
       run: |
         aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
         aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
         aws configure set region ${{ secrets.AWS_REGION }}

      # Install Kubectl

     - name: Install Kubectl
       run: |
         curl -o kubectl https://s3.us-west-2.amazonaws.com/amazon-eks/1.27.0/bin/linux/amd64/kubectl
         chmod +x kubectl
         sudo mv kubectl /usr/local/bin/


         # STEP 4: Connect to EKS
     - name: Update kubeconfig
       run: |
        aws eks --region ${{ secrets.AWS_REGION }} update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }}


      # Deploy App 

     - name: Deploy App 
       run: |
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml


        



    

   

        

        
        
  
     

     
      
      
 
 
